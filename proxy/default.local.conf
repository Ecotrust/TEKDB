server {
  listen 8080;
  client_max_body_size 0;

  location /static {
    alias /vol/static/static;
  }
  location /media {
    alias /vol/static/media;
  }
  location /import_database/ {
    uwsgi_request_buffering off;
    uwsgi_pass web:8000;
    include /etc/nginx/uwsgi_params;
  }
  location / {
    uwsgi_pass web:8000;
    include /etc/nginx/uwsgi_params;
  }
    
}