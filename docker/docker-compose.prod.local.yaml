services:
  db:
    extends:
      file: common.yaml
      service: db

  web:
    extends:
      file: common.yaml
      service: web
    command: ["prod-local"]
    env_file:
      - .env.dev
    ports: []
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - static_volume:/usr/src/app/static
      - media_volume:/usr/src/app/media
  proxy:
    build:
      context: ../proxy/
      dockerfile: ../proxy/Dockerfile
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "8080:8080"
    volumes:
      - static_volume:/vol/static/static:ro
      - media_volume:/vol/static/media:ro
  redis:
    extends:
      file: common.yaml
      service: redis
  celery:
    build: ../TEKDB/
    volumes:
      - ../TEKDB:/usr/src/app
    extends:
      file: common.yaml
      service: celery
  celery-beat:
    build: ../TEKDB/
    volumes:
      - ../TEKDB:/usr/src/app
    extends:
      file: common.yaml
      service: celery-beat

volumes:
  tekdb_db_data:
  static_volume:
  media_volume:
