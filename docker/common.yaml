services:
  db:
    image: postgis/postgis:15-3.4
    restart: always
    platform: linux/amd64
    environment:
      POSTGRES_DB: ${SQL_DATABASE}
      POSTGRES_USER: ${SQL_USER}
      POSTGRES_PASSWORD: ${SQL_PASSWORD}
    volumes:
      - tekdb_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SQL_USER} -d ${SQL_DATABASE} -h localhost -p ${SQL_PORT}"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:alpine
  web:
    build:
      context: ../TEKDB/
      dockerfile: ../TEKDB/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.dev
    ports:
      - "8000:8000"

    healthcheck:
      test: ["CMD-SHELL", "python manage.py check --deploy 2>/dev/null || python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/\")' 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
  
  celery: 
    build: ../TEKDB/
    entrypoint: []
    command: celery -A TEKDB worker -l info
    volumes: 
      - ../TEKDB:/usr/src/app
    env_file:
      - .env.dev
    environment:
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      DEBUG: ${DEBUG}
      SQL_ENGINE: ${SQL_ENGINE}
      SQL_HOST: ${SQL_HOST}
      SQL_PORT: ${SQL_PORT}
      SQL_DATABASE: ${SQL_DATABASE}
      SQL_USER: ${SQL_USER}
      SQL_PASSWORD: ${SQL_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      web:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_started
  celery-beat:
    build: ../TEKDB/
    entrypoint: []
    command: celery -A TEKDB beat -l info
    volumes:
      - ../TEKDB:/usr/src/app
    env_file:
      - .env.dev
    environment:
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      DEBUG: ${DEBUG}
      SQL_ENGINE: ${SQL_ENGINE}
      SQL_HOST: ${SQL_HOST}
      SQL_PORT: ${SQL_PORT}
      SQL_DATABASE: ${SQL_DATABASE}
      SQL_USER: ${SQL_USER}
      SQL_PASSWORD: ${SQL_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      web:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_started


